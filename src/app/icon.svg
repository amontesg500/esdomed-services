<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo azul institucional -->
  <rect width="32" height="32" rx="7" fill="#1d4ed8"/>
  <!-- Barras de estadística -->
  <rect x="4"  y="20" width="6" height="9" rx="1.5" fill="rgba(255,255,255,0.70)"/>
  <rect x="13" y="13" width="6" height="16" rx="1.5" fill="rgba(255,255,255,1)"/>
  <rect x="22" y="16" width="6" height="13" rx="1.5" fill="rgba(255,255,255,0.82)"/>
  <!-- Línea ECG / pulso médico -->
  <polyline
    points="3,10 7,10 9,4 11,15 13,6 16,10 29,10"
    stroke="#fb923c"
    stroke-width="1.8"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
